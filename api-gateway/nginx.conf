events {}

http {
    
    

    proxy_http_version 1.1;
    proxy_set_header Connection "";


    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    map $http_authorization $auth_header_present {
            default 1;
            "" 0;
        }

    upstream auth-service {
        server host.docker.internal:8001;
    }

    upstream product-service {
        server host.docker.internal:8002;
    }

    upstream inventory-service {
        server host.docker.internal:8003;
    }

    upstream cart-service {
        server host.docker.internal:8004;
    }

    upstream order-service {
        server host.docker.internal:8005;
    }

    upstream payment-service {
        server host.docker.internal:8006;
    }

    server {

        listen 80;


        # Auth Service
        location /api/v1/auth/ {
            proxy_pass http://auth-service;
        }

        # Product Service
        location /api/v1/products/ {
            proxy_pass http://product-service;
        }

        # Inventory Service
        # location /api/v1/inventory/ {
        #     if ($auth_header_present = 0) {
        #     return 401;
        #     }

            proxy_pass http://inventory-service;
        }

        # Cart Service
        location /api/v1/cart/ {
            if ($auth_header_present = 0) {
            return 401;
            }

            proxy_pass http://cart-service;
        }

        # Order Service
        location /api/v1/orders/ {
            if ($auth_header_present = 0) {
            return 401;
            }

            proxy_pass http://order-service;
        }

        # Payment Service
        location /api/v1/payments/ {
            if ($auth_header_present = 0) {
            return 401;
            }

            proxy_pass http://payment-service;
        }

        location / {
            return 404;
        }
    }
}