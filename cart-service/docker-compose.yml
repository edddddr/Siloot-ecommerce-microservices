version: '3.9'

services:
  cart-db:
    image: postgres:15
    container_name: cart-db
    env_file:
      - .env
    volumes:
      - cart_db_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"

  cart-redis:
    image: redis:7
    container_name: cart-redis
    ports:
      - "6383:6379"

  cart-service:
    build: .
    container_name: cart-service
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./app:/app
    ports:
      - "8004:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev  
    depends_on:
      - cart-db
      - cart-redis

volumes:
  cart_db_data: