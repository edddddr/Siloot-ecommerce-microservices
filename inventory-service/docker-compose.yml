version: '3.9'

services:
  inventory-db:
    image: postgres:15
    container_name: inventory-db
    env_file:
      - .env
    volumes:
      - inventory_db_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"

  inventory-redis:
    image: redis:7
    container_name: inventory-redis
    ports:
      - "6382:6379"

  inventory-service:
    build: .
    container_name: inventory-service
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./app:/app
    ports:
      - "8003:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev  
    depends_on:
      - inventory-db
      - inventory-redis

volumes:
  inventory_db_data: