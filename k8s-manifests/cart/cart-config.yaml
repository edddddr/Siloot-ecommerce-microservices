apiVersion: v1
kind: ConfigMap
metadata:
  name: cart-config
  namespace: ecommerce
data:
  POSTGRES_HOST: postgres.data.svc.cluster.local
  POSTGRES_PORT: "5432"

  REDIS_HOST: redis.data.svc.cluster.local
  REDIS_PORT: "6379"

  AUTH_SERVICE_URL: http://auth-service.ecommerce.svc.cluster.local:8000

  PRODUCT_SERVICE_URL: http://product-service.ecommerce.svc.cluster.local:8000

  INVENTORY_SERVICE_URL: http://inventory-service.ecommerce.svc.cluster.local:8000

  DJANGO_SETTINGS_MODULE: config.settings.dev