apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
        - name: cart-service
          image: edddddr/cart-service:latest
          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: cart-config
            - secretRef:
                name: cart-secret

          # readinessProbe:
          #   httpGet:
