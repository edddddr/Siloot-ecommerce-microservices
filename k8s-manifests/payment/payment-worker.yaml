apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-worker
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-worker
  template:
    metadata:
      labels:
        app: payment-worker
    spec:
      containers:
        - name: payment-worker
          image: edddddr/payment-service:latest
          command: ["python", "manage.py", "run_consumers"]

          envFrom:
            - configMapRef:
                name: payment-config
            - secretRef:
                name: payment-secret