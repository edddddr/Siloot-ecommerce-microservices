server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job:  docker-logs
          __path__: /var/lib/docker/containers/*/*.log
    
    pipeline_stages:
      - docker: {}   # extract "log" field

      # - json:        # parse inner JSON
